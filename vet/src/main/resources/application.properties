spring.application.name=vet

# Configuração de banco de dados MySQL (ajuste nome do banco, usuário e senha conforme o XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/vet?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
